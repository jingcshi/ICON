# icon-dev conda environment
#
# Create:
#   conda create --name icon-dev python=3.10 -y
#
# Then install deps:
#   pip install --no-cache-dir \
#     torch==2.11.0+cu128 \
#     --index-url https://download.pytorch.org/whl/cu128
#
#   pip install --no-cache-dir --ignore-installed \
#     faiss-gpu rdflib pyyaml nltk transformers datasets evaluate \
#     info-nce-pytorch pandas scikit-learn ruff mypy pytest click

name: icon-dev
channels:
  - defaults
dependencies:
  - python=3.10
  - pip:
    # PyTorch — CUDA 12.8 build (requires GPU driver >= 12.8)
    - torch==2.11.0+cu128
    # Core ICON dependencies
    - faiss-gpu
    - rdflib
    - pyyaml
    - networkx
    - nltk
    - numpy
    - tqdm
    # Training / fine-tuning
    - transformers
    - datasets
    - evaluate
    - info-nce-pytorch
    - pandas
    - scikit-learn
    # Dev tooling
    - ruff
    - mypy
    - pytest
    - click
